<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Todo 高階架構圖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .svg-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="svg-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 660" width="100%" height="auto">
        <rect width="100%" height="100%" fill="#0d1117" />
        <defs>
            <!-- 實心箭頭 -->
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#00e5ff" />
            </marker>
            <!-- 虛線箭頭 -->
            <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#00e5ff" />
            </marker>
            <!-- 螢光發光濾鏡 -->
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00e5ff" flood-opacity="0.4"/>
            </filter>
        </defs>

        <!-- 標題 -->
        <text x="400" y="32" fill="#00e5ff" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="1">Aurora Todo Architecture Flow</text>

        <!-- ======== 連線路徑 (避免交叉，直角轉接) ======== -->
        <!-- UI -> 事件監聽 -->
        <path d="M 400 100 L 400 140" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

        <!-- 事件監聽 -> 個別處理邏輯 -->
        <path d="M 400 200 L 400 220 L 120 220 L 120 240" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
        <path d="M 400 200 L 400 220 L 310 220 L 310 240" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
        <path d="M 400 200 L 400 220 L 490 220 L 490 240" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
        <path d="M 400 200 L 400 220 L 680 220 L 680 240" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

        <!-- 處理邏輯 -> saveAndRender() 更新中心 -->
        <path d="M 120 300 L 120 330 L 280 330 L 280 360" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
        <path d="M 310 300 L 310 360" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
        <path d="M 490 300 L 490 330 L 340 330 L 340 360" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

        <!-- addToCalendar -> Google Calendar 外部連線 -->
        <path d="M 680 300 L 680 360" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

        <!-- saveAndRender -> 本地儲存 (左邊輔助標籤) -->
        <path d="M 230 395 L 175 395" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
        <text x="202" y="388" fill="rgba(0, 229, 255, 0.8)" font-family="monospace" font-size="12" text-anchor="middle">Save</text>

        <!-- saveAndRender -> 渲染層 renderTasks -->
        <path d="M 310 420 L 310 460" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

        <!-- renderTasks -> DOM UI渲染 -->
        <path d="M 310 520 L 310 560" stroke="#00e5ff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

        <!-- 初始化：本地儲存 -> 渲染層 (初始載入，使用虛線標示) -->
        <path d="M 100 420 L 100 495 L 220 495" stroke="#00e5ff" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow-dashed)" />
        <text x="155" y="485" fill="rgba(0, 229, 255, 0.8)" font-family="monospace" font-size="12" text-anchor="middle">Initial Load</text>

        <!-- ======== 架構節點 ======== -->
        <!-- 1. 使用者介面起點 -->
        <g class="node">
            <rect x="290" y="50" width="220" height="50" rx="8" fill="rgba(0, 229, 255, 0.05)" stroke="#00e5ff" stroke-width="2" filter="url(#glow)"/>
            <text x="400" y="75" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">User Actions (UI)</text>
        </g>

        <!-- 2. 全局事件監聽委託 -->
        <g class="node">
            <rect x="300" y="150" width="200" height="50" rx="8" fill="rgba(0, 229, 255, 0.1)" stroke="#00e5ff" stroke-width="2" />
            <text x="400" y="175" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" text-anchor="middle">DOM Event Listeners</text>
        </g>

        <!-- 3. 新增任務 -->
        <g class="node">
            <rect x="35" y="250" width="170" height="50" rx="8" fill="rgba(0, 229, 255, 0.1)" stroke="#00e5ff" stroke-width="2" />
            <text x="120" y="275" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" text-anchor="middle">Submit Task Form</text>
        </g>

        <!-- 4. 切換任務狀態 -->
        <g class="node">
            <rect x="225" y="250" width="170" height="50" rx="8" fill="rgba(0, 229, 255, 0.1)" stroke="#00e5ff" stroke-width="2" />
            <text x="310" y="275" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" text-anchor="middle">toggleTaskStatus()</text>
        </g>

        <!-- 5. 刪除任務 -->
        <g class="node">
            <rect x="415" y="250" width="150" height="50" rx="8" fill="rgba(0, 229, 255, 0.1)" stroke="#00e5ff" stroke-width="2" />
            <text x="490" y="275" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" text-anchor="middle">deleteTask()</text>
        </g>

        <!-- 6. 行事曆功能 -->
        <g class="node">
            <rect x="600" y="250" width="160" height="50" rx="8" fill="rgba(0, 229, 255, 0.1)" stroke="#00e5ff" stroke-width="2" />
            <text x="680" y="275" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" text-anchor="middle">addToCalendar()</text>
        </g>

        <!-- 7. 架構核心：狀態儲存與統一呼叫 -->
        <g class="node">
            <rect x="230" y="370" width="160" height="50" rx="8" fill="rgba(0, 229, 255, 0.1)" stroke="#00e5ff" stroke-width="2" filter="url(#glow)"/>
            <text x="310" y="395" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">saveAndRender()</text>
        </g>

        <!-- 8. (輔助) 外部系統：Google Calendar Web -->
        <g class="node">
            <rect x="580" y="370" width="200" height="50" rx="8" fill="rgba(0, 229, 255, 0.05)" stroke="#00e5ff" stroke-width="2" stroke-dasharray="4,4" />
            <text x="680" y="395" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" text-anchor="middle">Ext: Google Calendar</text>
        </g>

        <!-- 9. (輔助) 內部儲存系統：LocalStorage -->
        <g class="node">
            <rect x="35" y="370" width="130" height="50" rx="8" fill="rgba(0, 229, 255, 0.05)" stroke="#00e5ff" stroke-width="2" stroke-dasharray="4,4" />
            <text x="100" y="395" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" text-anchor="middle">localStorage</text>
        </g>

        <!-- 10. 重新渲染邏輯 -->
        <g class="node">
            <rect x="230" y="470" width="160" height="50" rx="8" fill="rgba(0, 229, 255, 0.1)" stroke="#00e5ff" stroke-width="2" />
            <text x="310" y="495" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" text-anchor="middle">renderTasks()</text>
        </g>

        <!-- 11. 最終終點：DOM 刷新 -->
        <g class="node">
            <rect x="190" y="570" width="240" height="50" rx="8" fill="rgba(0, 229, 255, 0.05)" stroke="#00e5ff" stroke-width="2" filter="url(#glow)"/>
            <text x="310" y="595" dy="5" fill="#00e5ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">DOM: Task Lists Views</text>
        </g>
    </svg>
</div>

</body>
</html>
